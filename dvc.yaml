stages:

  preprocess:
    cmd: python preprocess.py
    outs:
      - data/x_train.npy
      - data/y_train.npy
      - data/x_val.npy
      - data/y_val.npy

  train:
    cmd: python train.py
    deps:
      - train.py
      - data/x_train.npy
      - data/y_train.npy
      - data/x_val.npy
      - data/y_val.npy
    outs:
      - model/model.keras