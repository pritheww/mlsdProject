name: DVC CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install DVC
      run: |
        pip install dvc

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AKIAZZIM3IVRNL7HORX4 }}
        aws-secret-access-key: ${{ secrets.Ovb2NzATRbYRbtJW3KWpy6OzNRYcDw7c7cxKra63 }}
        aws-region: ${{ secrets.ap-south-1 }}

    - name: Pull Dataset
      run: |
        dvc pull

    - name: Run DVC Pipeline
      run: |
        dvc repro

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: model/model.keras